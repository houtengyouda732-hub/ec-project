services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./ec-backend/ec-backend:/var/www
    networks:
      - ec-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./ec-backend/ec-backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ec-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ec_database
      MYSQL_USER: ec_user
      MYSQL_PASSWORD: ec_password
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ec-network

networks:
  ec-network:
    driver: bridge

volumes:
  db-data: